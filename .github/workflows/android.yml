name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo "EXPO_PUBLIC_APPS_SCRIPT_URL=${{ secrets.EXPO_PUBLIC_APPS_SCRIPT_URL }}" > .env
          echo "EXPO_PUBLIC_ACCESS_PASSWORD=${{ secrets.EXPO_PUBLIC_ACCESS_PASSWORD }}" >> .env
          echo "EXPO_PUBLIC_SHEET_URL=https://docs.google.com/spreadsheets/d/1z01drUB4oa08cLlq_NggAQqicCdnVbb8wido-9-U9_I/export?format=csv&gid=1457070184" >> .env

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
